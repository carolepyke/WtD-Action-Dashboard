<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Action Dashboard — Words That Deliver</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FDF6E8; --gold: #A07820; --gold-light: #C9A84C;
      --dark: #2C1F0E; --muted: rgba(44,31,14,0.45);
      --border: rgba(160,120,32,0.18); --card-bg: rgba(255,255,255,0.95);
    }
    body { background: var(--cream); font-family: 'Jost', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 10% 0%, rgba(201,168,76,0.10) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 90% 100%, rgba(160,120,32,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .star { position: fixed; pointer-events: none; z-index: 0; opacity: 0.10; }
    .wrap { position: relative; z-index: 1; max-width: 1060px; margin: 0 auto; padding: 48px 24px 100px; }
    .header { text-align: center; margin-bottom: 44px; }
    .eyebrow { font-size: 10px; letter-spacing: 5px; color: var(--gold); opacity: 0.7; margin-bottom: 14px; text-transform: uppercase; }
    .header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(34px, 5vw, 50px); font-weight: 300; color: var(--dark); line-height: 1.1; margin-bottom: 8px; }
    .header-sub { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-style: italic; color: var(--gold); margin-bottom: 28px; }
    .today-pill { display: inline-block; background: white; border: 1px solid var(--border); border-radius: 100px; padding: 10px 24px; font-size: 14px; color: var(--muted); font-style: italic; box-shadow: 0 2px 16px rgba(160,120,32,0.07); }
    .today-pill strong { color: var(--dark); font-style: normal; font-weight: 500; }
    .view-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .section-label { font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
    .view-toggle { display: flex; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; box-shadow: 0 1px 8px rgba(160,120,32,0.06); }
    .view-btn { padding: 7px 18px; border-radius: 8px; border: none; font-size: 13px; font-family: 'Jost', sans-serif; cursor: pointer; transition: all 0.2s ease; color: var(--muted); background: none; display: flex; align-items: center; gap: 6px; }
    .view-btn.active { background: var(--gold); color: white; }
    .add-bar { display: flex; gap: 10px; margin-bottom: 32px; background: white; border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; box-shadow: 0 2px 16px rgba(160,120,32,0.06); flex-wrap: wrap; }
    .add-bar input, .add-bar select { border: 1px solid var(--border); background: rgba(253,246,232,0.5); border-radius: 9px; padding: 9px 14px; font-size: 15px; font-family: 'Jost', sans-serif; color: var(--dark); outline: none; transition: border-color 0.2s; }
    .add-bar input:focus, .add-bar select:focus { border-color: var(--gold); }
    .add-bar input { flex: 1; min-width: 160px; }
    .add-bar button { padding: 9px 22px; border-radius: 9px; border: none; background: var(--gold); color: white; font-family: 'Jost', sans-serif; font-size: 14px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    .add-bar button:hover { opacity: 0.85; }
    .cards-canvas { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; margin-bottom: 48px; }
    .action-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 26px 22px 22px; position: relative; overflow: hidden; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease; animation: cardIn 0.45s ease backwards; cursor: default; }
    .action-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent, var(--gold)); border-radius: 18px 18px 0 0; }
    .action-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 36px rgba(160,120,32,0.13); }
    .card-done-btn { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; transition: all 0.2s; }
    .action-card:hover .card-done-btn { border-color: var(--accent, var(--gold)); color: var(--accent, var(--gold)); }
    .card-done-btn:hover { background: var(--accent, var(--gold)) !important; color: white !important; }
    .card-icon { font-size: 38px; margin-bottom: 14px; display: block; line-height: 1; }
    .card-cat-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent, var(--gold)); margin-bottom: 6px; font-weight: 500; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 19px; color: var(--dark); line-height: 1.4; margin-bottom: 8px; }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 18px; }
    .card-cta { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent, var(--gold)); font-weight: 500; background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 6px; transition: gap 0.2s; }
    .action-card:hover .card-cta { gap: 10px; }
    .list-view { display: flex; flex-direction: column; gap: 0; margin-bottom: 48px; }
    .list-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: white; border: 1px solid var(--border); border-bottom: none; transition: background 0.15s; animation: cardIn 0.35s ease backwards; }
    .list-item:first-child { border-radius: 14px 14px 0 0; }
    .list-item:last-child { border-radius: 0 0 14px 14px; border-bottom: 1px solid var(--border); }
    .list-item:only-child { border-radius: 14px; border-bottom: 1px solid var(--border); }
    .list-item:hover { background: rgba(253,246,232,0.7); }
    .list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .list-icon { font-size: 22px; flex-shrink: 0; }
    .list-content { flex: 1; min-width: 0; }
    .list-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--dark); margin-bottom: 2px; }
    .list-meta { font-size: 12px; color: var(--muted); }
    .list-done-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 12px; font-family: 'Jost', sans-serif; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .list-done-btn:hover { background: var(--gold); color: white; border-color: var(--gold); }
    .empty-state { text-align: center; padding: 72px 0; color: var(--muted); }
    .empty-state .e-icon { font-size: 52px; margin-bottom: 14px; opacity: 0.35; }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; }
    .evidence-section { margin-top: 12px; }
    .evidence-header { display: flex; align-items: center; gap: 14px; cursor: pointer; padding: 18px 0; user-select: none; border-top: 1px solid var(--border); }
    .evidence-title-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--dark); }
    .evidence-count { background: rgba(39,174,96,0.1); border: 1px solid rgba(39,174,96,0.25); border-radius: 20px; padding: 3px 12px; font-size: 12px; color: #27AE60; }
    .evidence-arrow { margin-left: auto; font-size: 12px; color: var(--muted); transition: transform 0.25s; }
    .evidence-arrow.open { transform: rotate(180deg); }
    .journal { padding: 28px 0 0; }
    .journal-month { margin-bottom: 32px; }
    .journal-month-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; padding-left: 28px; }
    .journal-entries { position: relative; }
    .journal-entries::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 1px; background: var(--border); }
    .journal-entry { display: flex; gap: 20px; align-items: flex-start; padding: 12px 0; animation: cardIn 0.35s ease backwards; position: relative; }
    .journal-dot { width: 20px; height: 20px; border-radius: 50%; background: white; border: 2px solid #27AE60; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; position: relative; z-index: 1; }
    .journal-body { flex: 1; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; border-left: 3px solid #27AE60; position: relative; }
    .journal-body-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--dark); margin-bottom: 4px; }
    .journal-body-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .journal-body-cat { display: inline-flex; align-items: center; gap: 4px; background: rgba(160,120,32,0.07); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--gold); }
    .journal-restore { position: absolute; top: 10px; right: 12px; font-size: 11px; color: rgba(44,31,14,0.2); background: none; border: none; cursor: pointer; font-family: 'Jost', sans-serif; transition: color 0.15s; }
    .journal-body:hover .journal-restore { color: var(--gold); }
    .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .gate-inner { max-width: 440px; }
    .gate-icon { font-size: 60px; margin-bottom: 20px; }
    .gate h1 { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; color: var(--dark); margin-bottom: 8px; }
    .gate p { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-style: italic; color: var(--gold); margin-bottom: 10px; }
    .gate-desc { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 32px; }
    .gate input { width: 100%; background: white; border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-size: 17px; font-family: 'Jost', sans-serif; color: var(--dark); outline: none; margin-bottom: 12px; text-align: center; box-shadow: 0 2px 12px rgba(160,120,32,0.07); }
    .gate input:focus { border-color: var(--gold); }
    .gate button { padding: 14px 40px; border-radius: 12px; border: none; background: var(--gold); color: white; font-size: 16px; font-family: 'Jost', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(160,120,32,0.28); transition: transform 0.15s, box-shadow 0.15s; }
    .gate button:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(160,120,32,0.35); }
    .footer { text-align: center; margin-top: 64px; font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
    .footer em { font-family: 'Cormorant Garamond', serif; font-size: 15px; display: block; margin-bottom: 4px; color: rgba(44,31,14,0.5); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  </style>
</head>
<body>
<svg class="star" style="top:7%;left:2%;width:44px" viewBox="0 0 48 48"><path d="M24 4 L26 22 L44 24 L26 26 L24 44 L22 26 L4 24 L22 22 Z" fill="#A07820"/></svg>
<svg class="star" style="top:22%;right:3%;width:28px" viewBox="0 0 48 48"><path d="M24 4 L26 22 L44 24 L26 26 L24 44 L22 26 L4 24 L22 22 Z" fill="#A07820"/></svg>
<svg class="star" style="bottom:28%;left:5%;width:22px" viewBox="0 0 48 48"><path d="M24 4 L26 22 L44 24 L26 26 L24 44 L22 26 L4 24 L22 22 Z" fill="#A07820"/></svg>
<svg class="star" style="bottom:12%;right:6%;width:38px" viewBox="0 0 48 48"><path d="M24 4 L26 22 L44 24 L26 26 L24 44 L22 26 L4 24 L22 22 Z" fill="#A07820"/></svg>
<svg class="star" style="top:52%;right:1%;width:18px" viewBox="0 0 48 48"><path d="M24 4 L26 22 L44 24 L26 26 L24 44 L22 26 L4 24 L22 22 Z" fill="#A07820"/></svg>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const CATS = [
  { id:"sparkle",    label:"Sparkle",    icon:"✨", color:"#A07820" },
  { id:"position",  label:"Position",   icon:"🎯", color:"#C0527A" },
  { id:"visibility",label:"Visibility", icon:"👁️", color:"#4A7B9D" },
  { id:"mindset",   label:"Mindset",    icon:"🌱", color:"#27AE60" },
  { id:"connect",   label:"Connect",    icon:"🤝", color:"#E67E22" },
  { id:"create",    label:"Create",     icon:"🎨", color:"#8E44AD" },
];
const DEFAULTS = [
  { id:1, title:"Write your Sparkle Statement",          desc:"Who you are, what you do and the light you bring.",      icon:"✨", cat:"sparkle",    color:"#A07820" },
  { id:2, title:"Define your ideal audience",            desc:"Who are you here to serve? Be specific and bold.",       icon:"🎯", cat:"position",   color:"#C0527A" },
  { id:3, title:"Update your LinkedIn headline",         desc:"Let your positioning speak before you do.",              icon:"💼", cat:"visibility", color:"#4A7B9D" },
  { id:4, title:"Share one piece of thought leadership", desc:"Your perspective matters. Put it where it can be seen.", icon:"📣", cat:"visibility", color:"#4A7B9D" },
  { id:5, title:"Complete your Me Map",                  desc:"Map your strengths, values and vision in one place.",    icon:"🗺️", cat:"sparkle",    color:"#A07820" },
  { id:6, title:"Record three wins this week",           desc:"Evidence of your value, captured before you forget.",    icon:"🌟", cat:"mindset",    color:"#27AE60" },
  { id:7, title:"Reach out to one new connection",       desc:"One conversation can shift everything.",                 icon:"🤝", cat:"connect",    color:"#E67E22" },
  { id:8, title:"Create your positioning statement",     desc:"Clear, confident and unmistakably you.",                 icon:"💎", cat:"position",   color:"#C0527A" },
];
const PROMPTS = [
  "What one thing would make today feel like a win?",
  "Which action is calling you today?",
  "What does your Sparkle need from you today?",
  "Choose one thing. Just one. Make it count.",
  "What would future you thank you for doing today?",
];
function getKey() { const m = new URLSearchParams(window.location.search).get("member"); return m ? `spa_v2_${m}` : "spa_v2_guest"; }
function getProject() { const p = new URLSearchParams(window.location.search).get("project"); return p ? decodeURIComponent(p) : null; }
function load() { try { return JSON.parse(localStorage.getItem(getKey())); } catch { return null; } }
function save(d) { try { localStorage.setItem(getKey(), JSON.stringify(d)); } catch {} }
function greeting() { const h = new Date().getHours(); return h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening"; }
function groupByMonth(items) {
  const groups = {};
  items.forEach(item => {
    const key = new Date(item.doneAt).toLocaleDateString("en-GB", { month:"long", year:"numeric" });
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });
  return groups;
}
function App() {
  const [name, setName]           = useState("");
  const [nameInput, setNameInput] = useState("");
  const [actions, setActions]     = useState([]);
  const [done, setDone]           = useState([]);
  const [view, setView]           = useState("visual");
  const [showEvidence, setShowEvidence] = useState(false);
  const [newTitle, setNewTitle]   = useState("");
  const [newCat, setNewCat]       = useState("sparkle");
  const [loaded, setLoaded]       = useState(false);
  const project                   = getProject();
  useEffect(() => { const s = load(); if (s?.name) { setName(s.name); setActions(s.actions ?? DEFAULTS); setDone(s.done ?? []); setLoaded(true); } }, []);
  useEffect(() => { if (!name) return; save({ name, actions, done }); }, [name, actions, done]);
  function enter(n) { const s = load(); setName(n); setActions(s?.actions ?? DEFAULTS); setDone(s?.done ?? []); setLoaded(true); }
  function markDone(id) { const item = actions.find(a => a.id === id); if (!item) return; setActions(p => p.filter(a => a.id !== id)); setDone(p => [{ ...item, doneAt: new Date().toISOString() }, ...p]); }
  function restore(id) { const item = done.find(d => d.id === id); if (!item) return; setDone(p => p.filter(d => d.id !== id)); setActions(p => [{ ...item, doneAt: undefined }, ...p]); }
  function addAction() { if (!newTitle.trim()) return; const cat = CATS.find(c => c.id === newCat) || CATS[0]; setActions(p => [{ id: Date.now(), title: newTitle.trim(), desc: "", icon: cat.icon, cat: newCat, color: cat.color }, ...p]); setNewTitle(""); }
  if (!loaded || !name) return (
    <div className="gate">
      <div className="gate-inner">
        <div className="gate-icon">✨</div>
        <div style={{fontSize:10,letterSpacing:5,color:"#A07820",opacity:.7,marginBottom:16,fontFamily:"'Jost',sans-serif",textTransform:"uppercase"}}>Words That Deliver</div>
        <h1>The Personal Brand Strategy Studio</h1>
        <p>Your Action Dashboard</p>
        <div className="gate-desc">A calm, spacious place to see what calls to you — and move towards it in your own way.</div>
        <input value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&enter(nameInput.trim())} placeholder="Your first name…" autoFocus/>
        <button onClick={()=>nameInput.trim()&&enter(nameInput.trim())}>Enter your space →</button>
      </div>
    </div>
  );
  const monthGroups = groupByMonth(done);
  return (
    <div className="wrap">
      <div className="header">
        <div className="eyebrow">Words That Deliver · The Personal Brand Strategy Studio</div>
        <h1>{greeting()}, {name}</h1>
        <div className="header-sub">{project ? project : "Your Action Dashboard"}</div>
        <div className="today-pill"><strong>Today — </strong>{PROMPTS[new Date().getDay() % PROMPTS.length]}</div>
      </div>
      <div className="add-bar">
        <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addAction()} placeholder="Add a new action…"/>
        <select value={newCat} onChange={e=>setNewCat(e.target.value)}>{CATS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select>
        <button onClick={addAction}>Add</button>
      </div>
      <div className="view-bar">
        <span className="section-label">{actions.length} {actions.length === 1 ? "action" : "actions"} remaining</span>
        <div className="view-toggle">
          <button className={`view-btn${view==="visual"?" active":""}`} onClick={()=>setView("visual")}>▦ Visual</button>
          <button className={`view-btn${view==="list"?" active":""}`} onClick={()=>setView("list")}>☰ List</button>
        </div>
      </div>
      {view === "visual" && (actions.length === 0 ? (
        <div className="empty-state"><div className="e-icon">🌿</div><p>Your canvas is clear. Add a new action above.</p></div>
      ) : (
        <div className="cards-canvas">
          {actions.map((a,i) => (
            <div key={a.id} className="action-card" style={{"--accent":a.color, animationDelay:`${i*0.055}s`}}>
              <button className="card-done-btn" title="Mark as done" onClick={()=>markDone(a.id)}>✓</button>
              <span className="card-icon">{a.icon}</span>
              <div className="card-cat-label">{CATS.find(c=>c.id===a.cat)?.label||a.cat}</div>
              <div className="card-title">{a.title}</div>
              {a.desc&&<div className="card-desc">{a.desc}</div>}
              <button className="card-cta" onClick={()=>markDone(a.id)}>Mark as done <span>→</span></button>
            </div>
          ))}
        </div>
      ))}
      {view === "list" && (actions.length === 0 ? (
        <div className="empty-state"><div className="e-icon">🌿</div><p>All clear. Add a new action above.</p></div>
      ) : (
        <div className="list-view">
          {actions.map((a,i) => (
            <div key={a.id} className="list-item" style={{animationDelay:`${i*0.04}s`}}>
              <div className="list-dot" style={{background:a.color}}/>
              <div className="list-icon">{a.icon}</div>
              <div className="list-content">
                <div className="list-title">{a.title}</div>
                {a.desc && <div className="list-meta">{a.desc}</div>}
              </div>
              <button className="list-done-btn" onClick={()=>markDone(a.id)}>Done ✓</button>
            </div>
          ))}
        </div>
      ))}
      {done.length > 0 && (
        <div className="evidence-section">
          <div className="evidence-header" onClick={()=>setShowEvidence(s=>!s)}>
            <span className="evidence-title-text">My Evidence Wall</span>
            <span className="evidence-count">{done.length} {done.length===1?"action":"actions"} completed</span>
            <span className={`evidence-arrow${showEvidence?" open":""}`}>▼</span>
          </div>
          {showEvidence && (
            <div className="journal">
              {Object.entries(monthGroups).map(([month, items]) => (
                <div key={month} className="journal-month">
                  <div className="journal-month-label">{month}</div>
                  <div className="journal-entries">
                    {items.map((a,i) => {
                      const cat = CATS.find(c=>c.id===a.cat);
                      return (
                        <div key={a.id} className="journal-entry" style={{animationDelay:`${i*0.04}s`}}>
                          <div className="journal-dot">✓</div>
                          <div className="journal-body">
                            <button className="journal-restore" onClick={()=>restore(a.id)}>↩ restore</button>
                            <div className="journal-body-title">{a.title}</div>
                            <div className="journal-body-meta">
                              <span className="journal-body-cat">{a.icon} {cat?.label||a.cat}</span>
                              <span>{new Date(a.doneAt).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      <div className="footer">
        <em>Your Sparkle is the key that opens doors</em>
        Words That Deliver · The Personal Brand Strategy Studio · © Carole Pyke
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
