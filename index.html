
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Action Dashboard — Words That Deliver</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FDF6E8; --gold: #A07820; --gold-light: #C9A84C;
      --dark: #2C1F0E; --muted: rgba(44,31,14,0.45);
      --border: rgba(160,120,32,0.18); --card-bg: rgba(255,255,255,0.95);
      --sidebar-w: 260px;
    }
    html, body { height: 100%; }
    body { background: var(--cream); font-family: 'Jost', sans-serif; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 0% 0%, rgba(201,168,76,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(160,120,32,0.07) 0%, transparent 60%);
    }

    /* ── Layout ── */
    .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: white;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }
    .sidebar-brand {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-eyebrow {
      font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold); opacity: 0.7; margin-bottom: 4px;
    }
    .sidebar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 400; color: var(--dark); line-height: 1.3;
    }
    .sidebar-user {
      font-size: 15px; color: var(--muted); margin-top: 6px;
    }

    /* Projects list */
    .sidebar-section-label {
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); padding: 20px 20px 8px;
    }
    .project-list { flex: 1; overflow-y: auto; padding: 0 10px; }
    .project-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: all 0.15s; margin-bottom: 2px; position: relative;
    }
    .project-item:hover { background: rgba(160,120,32,0.06); }
    .project-item.active { background: rgba(160,120,32,0.1); }
    .project-item.active::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; border-radius: 0 3px 3px 0; background: var(--gold);
    }
    .project-dot {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .project-info { flex: 1; min-width: 0; }
    .project-name {
      font-size: 15px; color: var(--dark); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .project-count { font-size: 13px; color: var(--muted); }
    .project-delete {
      opacity: 0; font-size: 17px; color: var(--muted);
      background: none; border: none; cursor: pointer;
      padding: 2px 4px; border-radius: 4px; transition: all 0.15s;
      flex-shrink: 0;
    }
    .project-item:hover .project-delete { opacity: 1; }
    .project-delete:hover { color: #C0392B; background: rgba(192,57,43,0.08); }

    /* New project button */
    .new-project-btn {
      margin: 8px 10px 0;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px dashed var(--border);
      background: none;
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      color: var(--muted);
      cursor: pointer;
      width: calc(100% - 20px);
      text-align: left;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .new-project-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(160,120,32,0.04); }

    /* New project MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(44,31,14,0.45);
      z-index: 300; display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn 0.2s ease;
    }
    .modal-box {
      background: white; border-radius: 20px; padding: 40px;
      max-width: 520px; width: 100%;
      box-shadow: 0 24px 64px rgba(44,31,14,0.2);
      border-top: 4px solid var(--gold);
      animation: slideUp 0.25s ease;
    }
    .modal-box h2 {
      font-family: 'Cormorant Garamond', serif; font-size: 30px;
      font-weight: 300; color: var(--dark); margin-bottom: 6px;
    }
    .modal-box p {
      font-size: 17px; color: var(--muted); margin-bottom: 28px; line-height: 1.6;
    }
    .modal-label {
      font-size: 14px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px; display: block;
    }
    .modal-emoji-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .modal-emoji-opt {
      width: 48px; height: 48px; border-radius: 12px; border: 2px solid var(--border);
      background: var(--cream); cursor: pointer; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-emoji-opt:hover { border-color: var(--gold); background: rgba(160,120,32,0.06); }
    .modal-emoji-opt.selected { border-color: var(--gold); background: rgba(160,120,32,0.12); transform: scale(1.1); }
    .modal-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 16px 20px; font-size: 20px; font-family: 'Jost', sans-serif;
      color: var(--dark); background: var(--cream); outline: none;
      margin-bottom: 24px; transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--gold); background: white; }
    .modal-btns { display: flex; gap: 12px; }
    .modal-btns button {
      flex: 1; padding: 16px; border-radius: 10px; font-size: 18px;
      font-family: 'Jost', sans-serif; cursor: pointer; border: none; transition: all 0.15s;
    }
    .modal-btn-create { background: var(--gold); color: white; }
    .modal-btn-create:hover { opacity: 0.88; }
    .modal-btn-cancel { background: rgba(160,120,32,0.08); color: var(--muted); }
    .modal-btn-cancel:hover { background: rgba(160,120,32,0.14); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 16px; color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    /* ── Main content ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 44px 36px 80px;
      max-width: calc(100vw - var(--sidebar-w));
    }

    /* ── Header ── */
    .main-header { margin-bottom: 36px; }
    .main-eyebrow { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); opacity: 0.7; margin-bottom: 8px; }
    .main-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(34px, 5vw, 52px); font-weight: 300; color: var(--dark); line-height: 1.15; margin-bottom: 6px; }
    .main-sub { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; color: var(--gold); margin-bottom: 20px; }
    .today-pill {
      display: inline-block; background: white; border: 1px solid var(--border);
      border-radius: 100px; padding: 12px 28px; font-size: 17px; color: var(--muted);
      font-style: italic; box-shadow: 0 2px 12px rgba(160,120,32,0.07);
    }
    .today-pill strong { color: var(--dark); font-style: normal; font-weight: 500; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .count-badge {
      font-size: 15px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    }
    .view-toggle {
      display: flex; background: white; border: 1px solid var(--border);
      border-radius: 9px; padding: 3px; gap: 2px;
      box-shadow: 0 1px 6px rgba(160,120,32,0.06);
    }
    .view-btn {
      padding: 9px 22px; border-radius: 7px; border: none; font-size: 16px;
      font-family: 'Jost', sans-serif; cursor: pointer; transition: all 0.2s;
      color: var(--muted); background: none; display: flex; align-items: center; gap: 5px;
    }
    .view-btn.active { background: var(--gold); color: white; }

    /* ── Add bar ── */
    .add-bar {
      display: flex; gap: 10px; margin-bottom: 28px;
      background: white; border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px;
      box-shadow: 0 2px 12px rgba(160,120,32,0.06); flex-wrap: wrap;
    }
    .add-bar input, .add-bar select {
      border: 1px solid var(--border); background: rgba(253,246,232,0.5);
      border-radius: 8px; padding: 12px 16px; font-size: 17px;
      font-family: 'Jost', sans-serif; color: var(--dark); outline: none;
      transition: border-color 0.2s;
    }
    .add-bar input:focus, .add-bar select:focus { border-color: var(--gold); }
    .add-bar input { flex: 1; min-width: 150px; }
    .add-bar button {
      padding: 8px 20px; border-radius: 8px; border: none;
      background: var(--gold); color: white; font-family: 'Jost', sans-serif;
      font-size: 17px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .add-bar button:hover { opacity: 0.85; }

    /* ── Visual cards ── */
    .cards-canvas {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px; margin-bottom: 40px;
    }
    .action-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px 20px 18px; position: relative;
      overflow: hidden; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
      animation: cardIn 0.4s ease backwards; cursor: default;
    }
    .action-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent, var(--gold)); border-radius: 16px 16px 0 0;
    }
    .action-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 10px 32px rgba(160,120,32,0.12); }
    .card-done-btn {
      position: absolute; top: 12px; right: 12px; width: 28px; height: 28px;
      border-radius: 50%; border: 1.5px solid var(--border); background: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: transparent; transition: all 0.2s;
    }
    .action-card:hover .card-done-btn { border-color: var(--accent, var(--gold)); color: var(--accent, var(--gold)); }
    .card-done-btn:hover { background: var(--accent, var(--gold)) !important; color: white !important; }
    .card-icon { font-size: 40px; margin-bottom: 12px; display: block; line-height: 1; }
    .card-cat-label { font-size: 15px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent, var(--gold)); margin-bottom: 5px; font-weight: 600; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--dark); line-height: 1.4; margin-bottom: 14px; }
    .card-cta {
      font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--accent, var(--gold)); font-weight: 600; background: none; border: none;
      cursor: pointer; padding: 0; display: flex; align-items: center; gap: 5px; transition: gap 0.2s;
    }
    .action-card:hover .card-cta { gap: 8px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
    .card-notes-btn {
      font-size: 15px; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px;
      transition: color 0.15s; font-family: 'Jost', sans-serif;
    }
    .card-notes-btn:hover { color: var(--accent, var(--gold)); }
    .card-notes-area {
      margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px;
      animation: cardIn 0.2s ease;
    }
    .card-notes-input {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 16px; font-family: 'Jost', sans-serif;
      color: var(--dark); background: rgba(253,246,232,0.5); outline: none;
      resize: none; min-height: 80px; line-height: 1.6; transition: border-color 0.2s;
    }
    .card-notes-input:focus { border-color: var(--accent, var(--gold)); background: white; }
    .card-notes-display {
      font-size: 16px; color: var(--muted); line-height: 1.65;
      white-space: pre-wrap; font-family: 'Jost', sans-serif;
    }
    /* List notes */
    .list-notes-btn {
      font-size: 15px; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: all 0.15s; font-family: 'Jost', sans-serif; white-space: nowrap; flex-shrink: 0;
    }
    .list-notes-btn:hover { background: rgba(160,120,32,0.08); color: var(--gold); }
    .list-notes-area {
      padding: 10px 18px 14px calc(14px + 9px + 20px + 14px + 14px);
      background: rgba(253,246,232,0.4); border-bottom: 1px solid var(--border);
      animation: cardIn 0.2s ease;
    }
    .list-notes-input {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 16px; font-family: 'Jost', sans-serif;
      color: var(--dark); background: white; outline: none;
      resize: none; min-height: 70px; line-height: 1.6; transition: border-color 0.2s;
    }
    .list-notes-input:focus { border-color: var(--gold); }

    /* ── Image gallery ── */
    .notes-images {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .notes-thumb {
      width: 72px; height: 72px; border-radius: 8px; object-fit: cover;
      border: 1.5px solid var(--border); cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .notes-thumb:hover { transform: scale(1.06); box-shadow: 0 4px 16px rgba(44,31,14,0.15); }
    .notes-add-img {
      width: 72px; height: 72px; border-radius: 8px;
      border: 1.5px dashed var(--border); background: rgba(253,246,232,0.6);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; color: var(--muted);
      transition: all 0.15s; gap: 2px;
    }
    .notes-add-img:hover { border-color: var(--gold); color: var(--gold); background: rgba(160,120,32,0.06); }
    .notes-add-img span { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-family: 'Jost', sans-serif; }
    .notes-thumb-wrap { position: relative; }
    .notes-thumb-del {
      position: absolute; top: -5px; right: -5px; width: 18px; height: 18px;
      border-radius: 50%; background: #C0392B; color: white; border: none;
      font-size: 12px; cursor: pointer; display: none;
      align-items: center; justify-content: center; line-height: 1;
    }
    .notes-thumb-wrap:hover .notes-thumb-del { display: flex; }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 500; display: flex; align-items: center; justify-content: center;
      padding: 24px; animation: fadeIn 0.2s ease;
    }
    .lightbox img {
      max-width: 90vw; max-height: 88vh; border-radius: 10px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px; font-size: 32px;
      color: white; background: none; border: none; cursor: pointer;
      opacity: 0.7; transition: opacity 0.15s;
    }
    .lightbox-close:hover { opacity: 1; }

    .project-menu-btn {
      opacity: 0; font-size: 22px; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 2px 5px; border-radius: 5px;
      transition: all 0.15s; flex-shrink: 0; line-height: 1;
    }
    .project-item:hover .project-menu-btn { opacity: 1; }
    .project-menu-btn:hover { background: rgba(160,120,32,0.1); color: var(--gold); }
    .ctx-menu {
      position: fixed; background: white; border: 1px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 32px rgba(44,31,14,0.15);
      z-index: 400; min-width: 200px; padding: 6px;
      animation: slideUp 0.15s ease;
    }
    .ctx-item {
      padding: 12px 16px; border-radius: 7px; cursor: pointer; font-size: 17px;
      color: var(--dark); font-family: 'Jost', sans-serif; display: flex; align-items: center; gap: 10px;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: rgba(160,120,32,0.08); }
    .ctx-item.danger { color: #C0392B; }
    .ctx-item.danger:hover { background: rgba(192,57,43,0.08); }
    .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .ctx-label { padding: 8px 16px 6px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

    /* ── Sub-board styles ── */
    .project-group { margin-bottom: 2px; }
    .project-item-sub {
      padding-left: 28px !important; opacity: 0.9;
    }
    .project-item-sub .project-dot { width: 22px !important; height: 22px !important; font-size: 12px !important; }
    .project-item-sub .project-name { font-size: 16px !important; }
    .sub-connector {
      position: absolute; left: 20px; top: 0; bottom: 0;
      width: 1px; background: var(--border);
    }
    .group-toggle {
      width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--border);
      background: white; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 11px; color: var(--muted);
      flex-shrink: 0; transition: all 0.15s; margin-right: -4px;
    }
    .group-toggle:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Drag styles ── */
    .project-item.dragging { opacity: 0.4; }
    .project-item.drag-over { border-top: 2px solid var(--gold); }
    /* ── Date fields ── */
    .notes-dates { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .date-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
    .date-label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'Jost', sans-serif; }
    .date-input { border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 15px; font-family: 'Jost', sans-serif; color: var(--dark); background: white; outline: none; transition: border-color 0.2s; width: 100%; }
    .date-input:focus { border-color: var(--gold); }
    .card-date-badge { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; margin-bottom: 2px; }
    .date-badge { font-size: 12px; font-family: 'Jost', sans-serif; padding: 3px 9px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
    .date-badge.planned { background: rgba(74,123,157,0.12); color: #4A7B9D; }
    .date-badge.due { background: rgba(231,76,60,0.1); color: #C0392B; }
    .date-badge.due.soon { background: rgba(231,76,60,0.2); color: #C0392B; font-weight: 600; }

    /* ── Calendar view ── */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .cal-nav { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 16px; cursor: pointer; font-size: 17px; color: var(--muted); transition: all 0.15s; }
    .cal-nav:hover { border-color: var(--gold); color: var(--gold); }
    .cal-month-label { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--dark); }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; }
    .cal-day-name { background: rgba(160,120,32,0.06); padding: 9px 4px; text-align: center; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'Jost', sans-serif; }
    .cal-cell { background: white; min-height: 86px; padding: 7px; position: relative; transition: background 0.15s; }
    .cal-cell:hover { background: rgba(253,246,232,0.8); }
    .cal-cell.other-month { background: rgba(253,246,232,0.3); }
    .cal-cell.today { background: rgba(160,120,32,0.06); }
    .cal-date-num { font-size: 13px; color: var(--muted); margin-bottom: 4px; font-family: 'Jost', sans-serif; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
    .cal-cell.today .cal-date-num { background: var(--gold); color: white; border-radius: 50%; font-size: 12px; }
    .cal-event { font-size: 11px; border-radius: 4px; padding: 2px 6px; margin-bottom: 2px; line-height: 1.4; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-event.planned { background: rgba(74,123,157,0.15); color: #2C5F7A; }
    .cal-event.due { background: rgba(192,57,43,0.12); color: #922B21; }

    /* ── Weekly view ── */
    .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .week-label { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--dark); }
    .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
    .week-col { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

}

const STORE_KEY = (id) => `wtd_dash_${id}`;
const PROJECTS_KEY = "wtd_projects";
function loadProjects() { try { return JSON.parse(localStorage.getItem(PROJECTS_KEY)) || []; } catch { return []; } }
function saveProjects(p){ try { localStorage.setItem(PROJECTS_KEY, JSON.stringify(p)); } catch {} }
function loadProject(id){ try { return JSON.parse(localStorage.getItem(STORE_KEY(id))); } catch { return null; } }
function saveProject(id,d){ try { localStorage.setItem(STORE_KEY(id), JSON.stringify(d)); } catch {} }

function greeting() { const h = new Date().getHours(); return h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening"; }
function groupByMonth(items) {
  const g = {};
  items.forEach(item => {
    const k = new Date(item.doneAt).toLocaleDateString("en-GB", { month:"long", year:"numeric" });
    if (!g[k]) g[k] = [];
    g[k].push(item);
  });
  return g;
}

// ── Image Gallery Component ───────────────────────────────────────────
function ImageGallery({ actionId, images, onAdd, onRemove, onLightbox }) {
  const inputRef = React.useRef();
  return (
    <div className="notes-images">
      {(images||[]).map((src, i) => (
        <div key={i} className="notes-thumb-wrap">
          <img className="notes-thumb" src={src} alt="" onClick={()=>onLightbox(src)}/>
          <button className="notes-thumb-del" onClick={()=>onRemove(actionId, i)}>✕</button>
        </div>
      ))}
      <div className="notes-add-img" onClick={()=>inputRef.current.click()}>
        <span style={{fontSize:22}}>🖼️</span>
        <span>Add</span>
        <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}}
          onChange={e=>{ onAdd(actionId, e.target.files[0]); e.target.value=""; }}/>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [userName, setUserName]     = useState("");
  const [nameInput, setNameInput]   = useState("");
  const [loaded, setLoaded]         = useState(false);
  const [projects, setProjects]     = useState([]);
  const [activeId, setActiveId]     = useState(null);
  const [actions, setActions]       = useState([]);
  const [done, setDone]             = useState([]);
  const [view, setView]             = useState("visual");
  const [showEvidence, setShowEvidence] = useState(false);
  const [expandedNotes, setExpandedNotes] = useState({});
  const [lightboxSrc, setLightboxSrc] = useState(null);
  const [calView, setCalView]         = useState("month"); // "month" | "week"
  const [calDate, setCalDate]         = useState(new Date());
  const [showPrintMenu, setShowPrintMenu] = useState(false);
  const [newTitle, setNewTitle]     = useState("");
  const [newCat, setNewCat]         = useState("sparkle");
  const [showNewProj, setShowNewProj] = useState(false);
  const [newProjName, setNewProjName] = useState("");
  const [newProjEmoji, setNewProjEmoji] = useState("📁");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [ctxMenu, setCtxMenu]         = useState(null);
  const [collapsedGroups, setCollapsedGroups] = useState({});
  const [syncing, setSyncing]         = useState(false);
  const [syncMsg, setSyncMsg]         = useState("");
  const dragItem = React.useRef(null);
  const dragOver = React.useRef(null);
  const saveTimer = React.useRef(null);

  // Load from Gist on mount
  useEffect(() => {
    setSyncing(true);
    setSyncMsg("Syncing…");
    gistLoad().then(data => {
      let projs = (data?.projects) || loadProjects();

      // Always ensure SPA Launch project exists
      const SPA_PROJECT = { id: "spa_launch", name: "Personal Branding SPA", emoji: "🚀", createdAt: "2024-01-01T00:00:00.000Z" };
      if (!projs.find(p => p.id === "spa_launch")) {
        projs = [SPA_PROJECT, ...projs];
      }

      // Restore all project data to localStorage for fast access
      if (data?.projectData) {
        data.projectData.forEach(({id, d}) => saveProject(id, d));
      }
      saveProjects(projs);
      setProjects(projs);
      setUserName("Words That Deliver");
      setLoaded(true);
      setSyncing(false);
      setSyncMsg("✓ Synced");
      setTimeout(() => setSyncMsg(""), 2000);
    });
  }, []);

  function selectProject(id, projList) {
    const proj = (projList || projects).find(p => p.id === id);
    if (!proj) return;
    setActiveId(id);
    const data = loadProject(id);
    if (proj.id === "spa_launch" && !data) {
      setActions(SPA_LAUNCH_ACTIONS.map(a => ({...a})));
      setDone([]);
    } else {
      setActions(data?.actions || []);
      setDone(data?.done || []);
    }
    setShowEvidence(false);
  }

  // Close context menu on outside click
  useEffect(() => {
    if (!ctxMenu) return;
    const close = () => closeCtxMenu();
    window.addEventListener('click', close);
    return () => window.removeEventListener('click', close);
  }, [ctxMenu]);

  // Close print menu on outside click
  useEffect(() => {
    if (!showPrintMenu) return;
    const close = () => setShowPrintMenu(false);
    window.addEventListener('click', close);
    return () => window.removeEventListener('click', close);
  }, [showPrintMenu]);

  // Save to Gist (debounced so it doesn't fire on every keystroke)
  function syncToGist(projs, projId, projActions, projDone) {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      setSyncMsg("Saving…");
      // Gather all project data
      const allProjs = projs || projects;
      const projectData = allProjs.map(p => {
        const d = p.id === projId
          ? { actions: projActions ?? actions, done: projDone ?? done }
          : (loadProject(p.id) || {});
        return { id: p.id, d };
      });
      await gistSave({ projects: allProjs, projectData });
      setSyncMsg("✓ Saved");
      setTimeout(() => setSyncMsg(""), 2000);
    }, 1500);
  }

  // Save locally immediately, sync to Gist after delay
  useEffect(() => {
    if (!activeId) return;
    saveProject(activeId, { actions, done });
    syncToGist(null, activeId, actions, done);
  }, [actions, done, activeId]);

  function enter(n) { /* no longer used */ }

  function createProject() {
    if (!newProjName.trim()) return;
    const id = "proj_" + Date.now();
    const proj = { id, name: newProjName.trim(), emoji: newProjEmoji, createdAt: new Date().toISOString() };
    const updated = [...projects, proj];
    saveProjects(updated);
    setProjects(updated);
    selectProject(id, updated);
    setNewProjName("");
    setNewProjEmoji("📁");
    setShowNewProj(false);
    syncToGist(updated, id, [], []);
  }

  function deleteProject(id, e) {
    e.stopPropagation();
    if (!window.confirm("Remove this project?")) return;
    const updated = projects.filter(p => p.id !== id);
    saveProjects(updated);
    setProjects(updated);
    if (activeId === id) {
      if (updated.length > 0) selectProject(updated[0].id, updated);
      else { setActiveId(null); setActions([]); setDone([]); }
    }
    syncToGist(updated, null, null, null);
  }

  // ── Drag to reorder ──
  function onDragStart(id) { dragItem.current = id; }
  function onDragEnter(id) { dragOver.current = id; }
  function onDragEnd() {
    if (!dragItem.current || !dragOver.current || dragItem.current === dragOver.current) return;
    const from = projects.findIndex(p => p.id === dragItem.current);
    const to   = projects.findIndex(p => p.id === dragOver.current);
    const updated = [...projects];
    const [moved] = updated.splice(from, 1);
    updated.splice(to, 0, moved);
    saveProjects(updated); setProjects(updated);
    dragItem.current = null; dragOver.current = null;
  }

  // ── Context menu ──
  function openCtxMenu(e, projId) {
    e.preventDefault(); e.stopPropagation();
    setCtxMenu({ x: e.clientX, y: e.clientY, projId });
  }
  function closeCtxMenu() { setCtxMenu(null); }

  // ── Set parent (make sub-board) ──
  function setParent(childId, parentId) {
    const updated = projects.map(p => p.id===childId ? {...p, parentId: parentId||null} : p);
    saveProjects(updated); setProjects(updated);
    closeCtxMenu();
  }

  // ── Toggle group collapse ──
  function toggleGroup(id) {
    setCollapsedGroups(p => ({...p, [id]: !p[id]}));
  }

  function markDone(id) {
    const item = actions.find(a => a.id === id);
    if (!item) return;
    setActions(p => p.filter(a => a.id !== id));
    setDone(p => [{ ...item, doneAt: new Date().toISOString() }, ...p]);
  }

  function restore(id) {
    const item = done.find(d => d.id === id);
    if (!item) return;
    setDone(p => p.filter(d => d.id !== id));
    setActions(p => [{ ...item, doneAt: undefined }, ...p]);
  }

  function updateNote(id, text) {
    setActions(p => p.map(a => a.id===id ? {...a, notes: text} : a));
  }
  function updateDate(id, field, val) {
    setActions(p => p.map(a => a.id===id ? {...a, [field]: val} : a));
  }

  // ── Calendar helpers ──
  function allCalEvents() {
    // Gather from current project's actions only
    const evts = [];
    actions.forEach(a => {
      if (a.plannedDate) evts.push({ ...a, dateVal: a.plannedDate, type: "planned" });
      if (a.dueDate)     evts.push({ ...a, dateVal: a.dueDate, type: "due" });
    });
    return evts;
  }
  function eventsForDate(dateStr) {
    return allCalEvents().filter(e => e.dateVal === dateStr);
  }
  function toDateStr(d) {
    return d.toISOString().slice(0,10);
  }
  function addMonths(d, n) { const r = new Date(d); r.setMonth(r.getMonth()+n); return r; }
  function startOfWeek(d) { const r = new Date(d); r.setDate(r.getDate()-r.getDay()); return r; }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
  function isDateSoon(dateStr) {
    const diff = (new Date(dateStr) - new Date()) / 86400000;
    return diff >= 0 && diff <= 3;
  }

  function printProject() {
    const proj = projects.find(p => p.id === activeId);
    if (!proj) return;
    const todayStr = new Date().toLocaleDateString("en-GB", {weekday:"long", day:"numeric", month:"long", year:"numeric"});
    const html = buildPrintHTML(proj.emoji + " " + proj.name, actions, todayStr, false);
    openPrint(html);
  }

  function printToday() {
    const todayStr = toDateStr(new Date());
    const todayItems = actions.filter(a => a.plannedDate === todayStr || a.dueDate === todayStr);
    const proj = projects.find(p => p.id === activeId);
    const label = (proj ? proj.emoji + " " + proj.name + " — " : "") + "Today's List";
    const dateStr = new Date().toLocaleDateString("en-GB", {weekday:"long", day:"numeric", month:"long", year:"numeric"});
    const html = buildPrintHTML(label, todayItems, dateStr, true);
    openPrint(html);
  }

            ${a.plannedDate ? `<span class="ps-date-planned">📅 Planned: ${new Date(a.plannedDate).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</span>` : ""}
            ${a.dueDate ? `<span class="ps-date-due">⏰ Due: ${new Date(a.dueDate).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</span>` : ""}
          </div>` : ""}

    return `<!DOCTYPE html><html><head><meta charset="utf-8">
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

        .ps-date { font-size: 13px; color: #888; text-align: right; }
        .ps-count { font-size: 13px; color: #888; margin-bottom: 20px; }
        .ps-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid #eee; page-break-inside: avoid; }
        .ps-checkbox { width: 18px; height: 18px; border: 1.5px solid #A07820; border-radius: 4px; flex-shrink: 0; margin-top: 3px; }

        .ps-notes { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 5px; white-space: pre-wrap; }
        .ps-dates { display: flex; gap: 16px; font-size: 12px; }
        .ps-date-planned { color: #4A7B9D; }
        .ps-date-due { color: #C0392B; }

        @media print { body { padding: 20px; } }
      </style></head><body>
      <div class="ps-header">
        <div>
          <div class="ps-brand">Words That Deliver · Action Dashboard</div>
          <div class="ps-title">${title}</div>
        </div>

      <div class="ps-footer">Your Sparkle is the key that opens doors</div>
      <script>window.onload=()=>{ window.print(); }<\/script>
    </body></html>`;
  }

    const w = window.open("", "_blank");
    w.document.write(html);
    w.document.close();
    setShowPrintMenu(false);
  }
  function toggleNote(id) {
    setExpandedNotes(p => ({...p, [id]: !p[id]}));
  }
  function addImage(id, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      setActions(p => p.map(a => a.id===id ? {...a, images: [...(a.images||[]), e.target.result]} : a));
    };
    reader.readAsDataURL(file);
  }
  function removeImage(actionId, imgIdx) {
    setActions(p => p.map(a => a.id===actionId ? {...a, images: (a.images||[]).filter((_,i)=>i!==imgIdx)} : a));
  }

  function addAction() {
    if (!newTitle.trim() || !activeId) return;
    const cat = CATS.find(c => c.id === newCat) || CATS[0];
    setActions(p => [{ id: Date.now(), title: newTitle.trim(), icon: cat.icon, cat: newCat, color: cat.color }, ...p]);
    setNewTitle("");
  }

  const activeProject = projects.find(p => p.id === activeId);
  const monthGroups   = groupByMonth(done);

  // ── Home screen (shown when no project selected) ──
  const showHome = loaded && !activeId;

  if (!loaded) return null;

  return (
    <div className="layout">

      {/* Mobile overlay */}
      <div className={`sidebar-overlay${sidebarOpen?" open":""}`} onClick={()=>setSidebarOpen(false)}/>

      {/* ── SIDEBAR ── */}

                  onDragEnter={()=>onDragEnter(proj.id)}
                  onDragEnd={onDragEnd}
                  onDragOver={e=>e.preventDefault()}
                  onClick={()=>{ selectProject(proj.id); setSidebarOpen(false); }}
                  
                >
                  {hasChildren && (
                    <button className="group-toggle" onClick={e=>{e.stopPropagation();toggleGroup(proj.id);}}>
                      {isCollapsed ? "▶" : "▼"}

                  <div className="project-dot">{proj.emoji}</div>
                  <div className="project-info">
                    <div className="project-name">{proj.name}</div>
                    <div className="project-count">
                      {(()=>{ const d=loadProject(proj.id); const a=d?.actions||(proj.id==="spa_launch"&&!d?SPA_LAUNCH_ACTIONS:[]); return `${a.length} action${a.length!==1?"s":""}`; })()}
                    </div>
                  </div>
                  <button className="project-menu-btn" onClick={e=>{e.stopPropagation();openCtxMenu(e, proj.id);}}>⋯</button>
                  <button className="project-delete" onClick={(e)=>deleteProject(proj.id,e)}>✕</button>
                </div>
                {/* Sub-boards */}
                {hasChildren && !isCollapsed && (
                  <div style={{position:"relative", paddingLeft:8}}>
                    <div className="sub-connector"/>
                    {children.map(child => (
                      <div key={child.id}
                        className={`project-item project-item-sub${activeId===child.id?" active":""}`}
                        draggable
                        onDragStart={()=>onDragStart(child.id)}
                        onDragEnter={()=>onDragEnter(child.id)}
                        onDragEnd={onDragEnd}
                        onDragOver={e=>e.preventDefault()}
                        onClick={()=>{ selectProject(child.id); setSidebarOpen(false); }}
                        
                      >
                        <div className="project-dot">{child.emoji}</div>
                        <div className="project-info">
                          <div className="project-name">{child.name}</div>
                          <div className="project-count">
                            {(()=>{ const d=loadProject(child.id); const a=d?.actions||(child.id==="spa_launch"&&!d?SPA_LAUNCH_ACTIONS:[]); return `${a.length} action${a.length!==1?"s":""}`; })()}
                          </div>
                        </div>
                        <button className="project-menu-btn" onClick={e=>{e.stopPropagation();openCtxMenu(e, child.id);}}>⋯</button>
                        <button className="project-delete" onClick={(e)=>deleteProject(child.id,e)}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* New project button — modal opens centre screen */}
        <button className="new-project-btn" onClick={()=>setShowNewProj(true)}>

        <div className="sidebar-footer">

        </div>
      </div>

      {/* ── MAIN ── */}
      <div className="main">

        {showHome ? (
          // ── HOME SCREEN ──
          projects.length === 0 ? (
            <div className="home">
              <div className="home-empty">
                <div className="home-empty-icon">✨</div>
                <h2>Welcome to Words That Deliver</h2>
                <p>A calm, spacious place to track what matters — project by project. Create your first one to get started.</p>
                <button className="home-empty-btn" onClick={()=>setShowNewProj(true)}>Create your first project →</button>
              </div>
            </div>
          ) : (
            <div className="home">
              <div className="home-header">
                <div className="home-eyebrow">Words That Deliver · Action Dashboard</div>
                <div className="home-title">{greeting()}</div>
                <div className="home-sub">Which project calls to you today?</div>
              </div>
              <div className="home-grid">
                {projects.map((proj, i) => {
                  const data = loadProject(proj.id);

                      <div className="home-card-name">{proj.name}</div>
                      <div className="home-card-meta">{remaining} remaining · {completed} done</div>
                      <div className="home-card-open">Open project <span>→</span></div>

            {/* Toolbar */}
            <div className="toolbar">
              <div className="toolbar-left" style={{display:"flex",alignItems:"center",gap:10}}>
                <span className="count-badge">{actions.length} {actions.length===1?"action":"actions"} remaining</span>
                <div style={{position:"relative"}}>
                  <button className="print-btn" onClick={()=>setShowPrintMenu(p=>!p)}>🖨️ Print</button>
                  {showPrintMenu && (
                    <div className="ctx-menu" style={{top:"110%",left:0,minWidth:200}} onClick={e=>e.stopPropagation()}>
                      <div className="ctx-item" onClick={printProject}>📋 Full project list</div>
                      <div className="ctx-item" onClick={printToday}>📅 Today's items only</div>
                    </div>
                  )}
                </div>
              </div>
              <div className="view-toggle">
                <button className={`view-btn${view==="visual"?" active":""}`} onClick={()=>setView("visual")}>▦ Visual</button>
                <button className={`view-btn${view==="list"?" active":""}`} onClick={()=>setView("list")}>☰ List</button>
                <button className={`view-btn${view==="calendar"?" active":""}`} onClick={()=>setView("calendar")}>📅 Calendar</button>
              </div>
            </div>

            {/* ── VISUAL ── */}
            {view==="visual" && (
              actions.length===0 ? (
                <div className="empty-state"><div className="e-icon">🌿</div><p>Canvas is clear — add an action above.</p></div>
              ) : (
                <div className="cards-canvas">
                  {actions.map((a,i)=>(
                    <div key={a.id} className="action-card" style={{"--accent":a.color,animationDelay:`${i*0.05}s`}}>
                      <button className="card-done-btn" onClick={()=>markDone(a.id)}>✓</button>
                      <span className="card-icon">{a.icon}</span>
                      <div className="card-cat-label">{CATS.find(c=>c.id===a.cat)?.label||a.cat}</div>
                      <div className="card-title">{a.title}</div>
                      <div className="card-footer">
                        <button className="card-cta" onClick={()=>markDone(a.id)}>Mark as done <span>→</span></button>
                        <button className="card-notes-btn" onClick={()=>toggleNote(a.id)}>
                          {expandedNotes[a.id] ? "▲ hide" : (a.notes||(a.plannedDate||a.dueDate) ? "📝 details" : "+ details")}
                        </button>
                      </div>
                      {(a.plannedDate||a.dueDate) && !expandedNotes[a.id] && (
                        <div className="card-date-badge">
                          {a.plannedDate && <span className="date-badge planned">📅 {new Date(a.plannedDate).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>}
                          {a.dueDate && <span className={`date-badge due${isDateSoon(a.dueDate)?" soon":""}`}>⏰ {new Date(a.dueDate).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>}
                        </div>
                      )}
                      {expandedNotes[a.id] && (
                        <div className="card-notes-area">
                          <textarea className="card-notes-input"
                            value={a.notes||""}
                            onChange={e=>updateNote(a.id, e.target.value)}
                            placeholder="Add details, links, instructions for your VA…"/>
                          <div className="notes-dates">
                            <div className="date-field">
                              <label className="date-label">📅 Planned date</label>
                              <input type="date" className="date-input" value={a.plannedDate||""} onChange={e=>updateDate(a.id,"plannedDate",e.target.value)}/>
                            </div>
                            <div className="date-field">
                              <label className="date-label">⏰ Due date</label>
                              <input type="date" className="date-input" value={a.dueDate||""} onChange={e=>updateDate(a.id,"dueDate",e.target.value)}/>
                            </div>
                          </div>
                          <ImageGallery actionId={a.id} images={a.images}
                            onAdd={addImage} onRemove={removeImage} onLightbox={setLightboxSrc}/>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )
            )}

            {/* ── LIST ── */}
            {view==="list" && (
              actions.length===0 ? (
                <div className="empty-state"><div className="e-icon">🌿</div><p>All clear — add an action above.</p></div>
              ) : (
                <div className="list-view">
                  {actions.map((a,i)=>(
                    <React.Fragment key={a.id}>
                      <div className="list-item" style={{animationDelay:`${i*0.035}s`}}>
                        <div className="list-dot" style={{background:a.color}}/>
                        <div className="list-icon">{a.icon}</div>
                        <div className="list-content">
                          <div className="list-title">{a.title}</div>
                          <div className="list-meta">{CATS.find(c=>c.id===a.cat)?.label||a.cat}</div>
                        </div>
                        <button className="list-notes-btn" onClick={()=>toggleNote(a.id)}>
                          {expandedNotes[a.id] ? "▲" : (a.notes ? "📝 notes" : "+ notes")}
                        </button>
                        <button className="list-done-btn" onClick={()=>markDone(a.id)}>Done ✓</button>
                      </div>
                      {expandedNotes[a.id] && (
                        <div className="list-notes-area">
                          <textarea className="list-notes-input"
                            value={a.notes||""}
                            onChange={e=>updateNote(a.id, e.target.value)}
                            placeholder="Add details, links, instructions for your VA…"/>
                          <div className="notes-dates">
                            <div className="date-field">
                              <label className="date-label">📅 Planned date</label>
                              <input type="date" className="date-input" value={a.plannedDate||""} onChange={e=>updateDate(a.id,"plannedDate",e.target.value)}/>
                            </div>
                            <div className="date-field">
                              <label className="date-label">⏰ Due date</label>
                              <input type="date" className="date-input" value={a.dueDate||""} onChange={e=>updateDate(a.id,"dueDate",e.target.value)}/>
                            </div>
                          </div>
                          <ImageGallery actionId={a.id} images={a.images}
                            onAdd={addImage} onRemove={removeImage} onLightbox={setLightboxSrc}/>
                        </div>
                      )}
                    </React.Fragment>
                  ))}
                </div>
              )
            )}

            {/* ── CALENDAR ── */}
            {view==="calendar" && (() => {
              const today = toDateStr(new Date());
              return (
                <div>
                  {/* Sub-toggle: Month / Week */}
                  <div style={{display:"flex",gap:8,marginBottom:20}}>
                    <button className={`view-btn${calView==="month"?" active":""}`} onClick={()=>setCalView("month")}>Month</button>
                    <button className={`view-btn${calView==="week"?" active":""}`} onClick={()=>setCalView("week")}>Week</button>
                  </div>

                  {calView==="month" && (() => {
                    const y = calDate.getFullYear(), m = calDate.getMonth();
                    const firstDay = new Date(y, m, 1).getDay();
                    const daysInMonth = new Date(y, m+1, 0).getDate();
                    const cells = [];
                    for (let i=0;i<firstDay;i++) {
                      const d = new Date(y,m,1-firstDay+i);
                      cells.push({date:d,str:toDateStr(d),cur:false});
                    }
                    for (let i=1;i<=daysInMonth;i++) {
                      const d = new Date(y,m,i);
                      cells.push({date:d,str:toDateStr(d),cur:true});
                    }
                    while (cells.length%7!==0) {
                      const d = new Date(y,m+1,cells.length-firstDay-daysInMonth+1);
                      cells.push({date:d,str:toDateStr(d),cur:false});
                    }
                    return (
                      <div>
                        <div className="cal-header">
                          <button className="cal-nav" onClick={()=>setCalDate(addMonths(calDate,-1))}>‹</button>
                          <div className="cal-month-label">{calDate.toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</div>
                          <button className="cal-nav" onClick={()=>setCalDate(addMonths(calDate,1))}>›</button>
                        </div>
                        <div className="cal-grid">
                          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>(
                            <div key={d} className="cal-day-name">{d}</div>
                          ))}
                          {cells.map((cell,i)=>{
                            const evts = eventsForDate(cell.str);
                            return (
                              <div key={i} className={`cal-cell${!cell.cur?" other-month":""}${cell.str===today?" today":""}`}>
                                <div className="cal-date-num">{cell.date.getDate()}</div>
                                {evts.map((e,j)=>(
                                  <div key={j} className={`cal-event ${e.type}`} title={e.title}>
                                    {e.icon} {e.title}
                                  </div>
                                ))}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })()}

                  {calView==="week" && (() => {
                    const weekStart = startOfWeek(calDate);
                    const days = Array.from({length:7},(_,i)=>addDays(weekStart,i));
                    return (
                      <div>
                        <div className="week-header">
                          <button className="cal-nav" onClick={()=>setCalDate(addDays(calDate,-7))}>‹ Prev</button>
                          <div className="week-label">
                            {weekStart.toLocaleDateString("en-GB",{day:"numeric",month:"short"})} – {addDays(weekStart,6).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
                          </div>
                          <button className="cal-nav" onClick={()=>setCalDate(addDays(calDate,7))}>Next ›</button>
                        </div>
                        <div className="week-grid">
                          {days.map((day,i)=>{
                            const str = toDateStr(day);
                            const isToday = str===toDateStr(new Date());
                            const evts = eventsForDate(str);
                            return (
                              <div key={i} className={`week-col${isToday?" today-col":""}`}>
                                <div className="week-col-head">
                                  <div className="wday">{day.toLocaleDateString("en-GB",{weekday:"short"})}</div>
                                  <div className="wdate">{day.getDate()}</div>
                                </div>
                                <div className="week-events">
                                  {evts.map((e,j)=>(
                                    <div key={j} className={`week-event ${e.type}`}>
                                      <div className="week-event-title">{e.icon} {e.title}</div>
                                      <div className="week-event-proj">{e.type==="planned"?"📅 Planned":"⏰ Due"}</div>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              );
            })()}

            {/* ── EVIDENCE WALL ── */}
            {done.length>0 && (
              <div className="evidence-section">
                <div className="evidence-header" onClick={()=>setShowEvidence(s=>!s)}>
                  <span className="evidence-title">My Evidence Wall</span>
                  <span className="evidence-count">{done.length} completed</span>
                  <span className={`evidence-arrow${showEvidence?" open":""}`}>▼</span>
                </div>
                {showEvidence && (
                  <div className="journal">
                    {Object.entries(monthGroups).map(([month,items])=>(
                      <div key={month} className="journal-month">
                        <div className="journal-month-label">{month}</div>
                        <div className="journal-entries">
                          {items.map((a,i)=>{
                            const cat=CATS.find(c=>c.id===a.cat);
                            return (
                              <div key={a.id} className="journal-entry" style={{animationDelay:`${i*0.035}s`}}>
                                <div className="journal-dot">✓</div>
                                <div className="journal-body">
                                  <button className="journal-restore" onClick={()=>restore(a.id)}>↩ restore</button>
                                  <div className="journal-body-title">{a.title}</div>
                                  <div className="journal-body-meta">
                                    <span className="journal-body-cat">{a.icon} {cat?.label||a.cat}</span>
                                    <span>{new Date(a.doneAt).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            <div className="footer">
              <em>Your Sparkle is the key that opens doors</em>
              Words That Deliver · The Personal Brand Strategy Studio · © Carole Pyke
            </div>
          </>
        )}
      </div>

      {/* ── CONTEXT MENU ── */}
      {ctxMenu && (
        <div className="ctx-menu" style={{top: ctxMenu.y, left: ctxMenu.x}}
          onClick={e=>e.stopPropagation()}>
          <div className="ctx-label">Move under…</div>
          {projects.filter(p => p.id !== ctxMenu.projId && !p.parentId).map(p => (
            <div key={p.id} className="ctx-item" onClick={()=>setParent(ctxMenu.projId, p.id)}>
              {p.emoji} {p.name}
            </div>
          ))}
          {projects.find(p=>p.id===ctxMenu.projId)?.parentId && (
            <>
              <div className="ctx-divider"/>
              <div className="ctx-item" onClick={()=>setParent(ctxMenu.projId, null)}>
                ↑ Move to top level
              </div>
            </>
          )}
          <div className="ctx-divider"/>
          <div className="ctx-item danger" onClick={e=>{ deleteProject(ctxMenu.projId, e); closeCtxMenu(); }}>
            ✕ Remove project
          </div>
        </div>
      )}

      {/* ── LIGHTBOX ── */}
      {lightboxSrc && (
        <div className="lightbox" onClick={()=>setLightboxSrc(null)}>
          <button className="lightbox-close" onClick={()=>setLightboxSrc(null)}>✕</button>
          <img src={lightboxSrc} alt="" onClick={e=>e.stopPropagation()}/>
        </div>
      )}

      {/* ── NEW PROJECT MODAL ── */}
      {showNewProj && (
        <div className="modal-overlay" onClick={()=>{setShowNewProj(false);setNewProjName("");}}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <h2>New Project</h2>
            <p>Give your project a name and pick an icon to make it yours.</p>
            <span className="modal-label">Choose an icon</span>
            <div className="modal-emoji-row">
              {EMOJIS.map(e=>(
                <button key={e} className={`modal-emoji-opt${newProjEmoji===e?" selected":""}`}
                  onClick={()=>setNewProjEmoji(e)}>{e}</button>
              ))}
            </div>
            <span className="modal-label">Project name</span>
            <input className="modal-input" value={newProjName}
              onChange={e=>setNewProjName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&createProject()}
              placeholder="e.g. THRIVE 2026, Website Rebrand…"
              autoFocus/>
            <div className="modal-btns">
              <button className="modal-btn-cancel" onClick={()=>{setShowNewProj(false);setNewProjName("");}}>Cancel</button>
              <button className="modal-btn-create" onClick={createProject}>Create project →</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
